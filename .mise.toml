# .mise.toml — tool versions + task orchestration
min_version = "2025.1"

[tools]
erlang = "28.3.1"
elixir = "1.19-otp-28"

# ── Build ─────────────────────────────────────────────────────

[tasks.build]
description = "Compile Elixir"
dir = "opal"
run = "mix compile --warnings-as-errors"

[tasks.release]
description = "Build a production release (opal binary)"
dir = "opal"
run = "MIX_ENV=prod mix release opal --overwrite"

# ── Test ──────────────────────────────────────────────────────

[tasks.test]
description = "Run Elixir tests"
dir = "opal"
run = "mix test"

# ── Lint & Format ─────────────────────────────────────────────

[tasks.lint]
description = "Check Elixir formatting and types"
dir = "opal"
run = ["mix format --check-formatted", "mix dialyzer"]

[tasks.format]
description = "Format Elixir code"
dir = "opal"
run = "mix format"

# ── Dependencies ──────────────────────────────────────────────

[tasks.deps]
description = "Install Elixir dependencies"
dir = "opal"
run = "mix deps.get"

# ── Dev & Ops ─────────────────────────────────────────────────

[tasks.server]
description = "Start the opal server (dev mode, no-halt)"
dir = "opal"
run = "mix run --no-halt"

# ── CI Preflight ──────────────────────────────────────────────

[tasks.precommit]
description = "Full CI preflight: deps, lint, build, test"
depends = ["deps"]
run = [
  "mise run lint",
  "mise run build",
  "mise run test",
]